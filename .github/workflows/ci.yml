name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit Tests
        run: pnpm run test:unit --passWithNoTests

  smoke-test:
    name: Smoke Tests (E2E)
    runs-on: ubuntu-latest
    needs: lint-and-test

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: stella
          POSTGRES_PASSWORD: stella_dev
          POSTGRES_DB: stella
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://stella:stella_dev@localhost:5432/stella
        run: pnpm run db:migrate:raw

      - name: Start server
        env:
          DATABASE_URL: postgresql://stella:stella_dev@localhost:5432/stella
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          PORT: 3000
        run: |
          pnpm run dev &
          sleep 5

      - name: Run smoke tests
        env:
          SMOKE_TEST_URL: http://localhost:3000
        run: pnpm run test:e2e --passWithNoTests
