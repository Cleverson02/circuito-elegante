# etl-squad v1.0 — Data Extraction, Transformation & Loading
# 6 functional agents: route, extract, parse, enrich, validate, load
# Data: 2026-03-05

name: etl-squad
display_name: "ETL Squad"
description: "Squad autonoma especializada em ingerir qualquer fonte de dado e transforma-la em estruturas limpas, semanticas e prontas para consumo por outros agentes"
domain: "Data Extraction, Transformation, Loading, Web Scraping, Transcription, OCR, Chunking"
version: "1.1.0"
author: "AIOX Community"
entry_agent: etl-chief
tested: true

methodology:
  name: "ETL Pipeline v1.0"
  description: |
    Pipeline de 6 fases: Route > Extract > Parse > Enrich > Validate > Load.
    Suporta 10 tipos de fonte (webpage, YouTube, PDF, spreadsheet, deck, audio, image, feed, repo, batch).
    Output em Markdown com YAML frontmatter, YAML estruturado, ou JSONL para RAG.
    Quality scoring com 6 componentes ponderados, threshold 0.6.

agents:
  - id: etl-chief
    tier: 0
    role: "Pipeline orchestrator — routing e decisao de pipeline"
  - id: extractor
    tier: 1
    role: "Source extraction — fetch, download, fallback chains"
  - id: parser
    tier: 1
    role: "Content transformation — HTML to MD, noise removal, table normalization"
  - id: enricher
    tier: 2
    role: "Semantic enrichment — frontmatter, summary, chunks, entities, tags"
  - id: validator
    tier: 2
    role: "Quality gate — scoring 6 componentes, verdicts pass/warn/fail"
  - id: loader
    tier: 2
    role: "Output writing — file naming, directory org, job envelope"

pipelines:
  - url-to-markdown
  - youtube-to-brief
  - pdf-to-knowledge
  - spreadsheet-to-json
  - deck-to-text
  - audio-to-transcript
  - image-to-text
  - feed-to-items
  - repo-to-context
  - batch-urls
  - compile
  - enrich
  - extract-keyframes

keywords:
  - etl
  - extraction
  - parsing
  - transformation
  - markdown
  - data-pipeline
  - web-scraping
  - transcription
  - ocr
  - chunking
  - readability
  - youtube
  - pdf
  - frontmatter
  - compile
  - keyframe
  - workspace
  - contract
  - enrich
