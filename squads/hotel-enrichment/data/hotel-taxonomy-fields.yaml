        name: room_service
        storage: jsonb
        type: object
        subfields: [available, hours]
      - id: "4.5"
        name: dietary_options
        storage: jsonb
        type: array
        examples: [vegano, celíaco, kosher, vegetariano]

  policies_rules:
    name: "Políticas & Regras"
