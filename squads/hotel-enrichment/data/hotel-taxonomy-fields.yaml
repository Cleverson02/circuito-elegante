        name: leisure_items
        storage: jsonb
        type: array
        form_question: Q16
      - id: "3.5"
        name: wellness
        storage: jsonb
        type: text_or_array
        form_question: Q17
      - id: "3.6"
        name: event_space
        storage: jsonb
        type: object
        form_question: Q20
        subfields: [has_events, description]
      - id: "3.7"
        name: wifi
        storage: jsonb
        type: object
        form_question: Q29
        subfields: [included, quality]
      - id: "3.8"
        name: accessibility
        storage: jsonb
        type: object
        subfields: [has_accessibility, description]
      - id: "3.9"
        name: gym
        storage: jsonb
        type: object
        subfields: [has_gym, description]

  gastronomy:
    name: "Gastronomia"
    id_prefix: "4"
    fields:
      - id: "4.1"
        name: restaurants
        storage: jsonb
        type: array_objects
        form_question: Q13
