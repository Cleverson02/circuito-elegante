# Hotel Taxonomy Fields — Machine-readable reference
# Source: docs/architecture/HOTEL-DATA-TAXONOMY.md (validated 2026-04-03)
# Total: 58 fields across 10 categories
# Schema fields: 11 (already in PostgreSQL columns)
# JSONB fields: 47 (stored in hotels.data)

version: "1.0.0"
taxonomy_doc: "docs/architecture/HOTEL-DATA-TAXONOMY.md"
total_fields: 58
schema_fields: 11
jsonb_fields: 47

categories:
  identity_location:
    name: "Identidade & Localização"
    id_prefix: "1"
    fields:
      - id: "1.1"
        name: name
        storage: schema_column
        type: text
        required: true
      - id: "1.2"
        name: municipality
        storage: schema_column
        type: text
        required: true
      - id: "1.3"
        name: uf
        storage: schema_column
        type: char(2)
        required: true
      - id: "1.4"
        name: region
        storage: schema_column
        type: enum
        values: [nordeste, sudeste, sul, centro-oeste, norte]
        required: true
      - id: "1.5"
        name: destination
        storage: schema_column
        type: text
        required: true
      - id: "1.6"
        name: experience
        storage: schema_column
        type: enum
        values: [praia, campo, serra, cidade]
        required: true
      - id: "1.7"
        name: website_url
        storage: jsonb
        type: url
        form_question: Q4
      - id: "1.8"
        name: google_maps_url
        storage: jsonb
        type: url
        form_question: Q5
      - id: "1.9"
        name: description
        storage: jsonb
        type: text_long
        form_question: Q6
      - id: "1.10"
        name: lodging_type
        storage: jsonb
        type: string
        form_question: Q7
        examples: [boutique, resort, pousada de charme, hotel fazenda]

  accommodations:
    name: "Acomodações"
    id_prefix: "2"
    fields:
