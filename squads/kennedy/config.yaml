# Veto Conditions (Centralized)
veto_conditions:
  config_file: config/veto-conditions.yaml
  enforcement: strict
  tiers:
    tier_0_universal: 3
    tier_1_workflow: 8
    tier_2_agent_specific: 6
    tier_3_handoff: 1
  handoff_template: templates/handoff-context-tmpl.yaml

# Validation Scripts
validation_scripts:
  marketing_data_validator:
    path: scripts/validate-marketing-data.py
    usage: "python squads/kennedy/scripts/validate-marketing-data.py --inline 'results_triangle:Y,usp:Y,...'"
    trigger: "Before any marketing campaign design"
    returns: "PASS (exit 0) or FAIL (exit 1)"

  handoff_validator:
    path: scripts/validate-handoff.py
    usage: "python squads/kennedy/scripts/validate-handoff.py <file.yaml>"
    trigger: "Before any specialist-to-specialist handoff"
    returns: "PASS (exit 0) or FAIL (exit 1)"

  antipattern_validator:
    path: scripts/validate-antipattern.py
    usage: "python squads/kennedy/scripts/validate-antipattern.py --interactive"
    trigger: "Before approving campaign for launch"
    returns: "PASS (exit 0) or VETO (exit 1)"
