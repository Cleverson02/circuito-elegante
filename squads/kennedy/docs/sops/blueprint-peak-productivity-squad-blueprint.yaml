      text: "There is never enough time. Entrepreneurs learn to get what they want working with what they've got."
      application: "Accept time scarcity. Focus on allocation quality, not quantity."

    - number: 21
      text: "No one on his deathbed says I wish I'd spent more time at the office."
      application: "Wellbeing-guardian's compass. Productivity serves life."

    - number: 14
      text: "No one will ever care about your business as much as you do."
      application: "Delegate B/C tasks -- they won't do it YOUR way, but they can do it WELL ENOUGH."

  mental_models:
    - name: "The $100,000 Racehorse"
      application: "Treat yourself as the most valuable asset. Rest, nutrition, exercise."

    - name: "Time Vampires"
      application: "Core framework for Phase 2 -- identify and eliminate all time drains."

    - name: "The Deathbed Test"
      application: "Ultimate priority filter when Yes or No Test gives ambiguous results."

    - name: "The Yes or No Test"
      application: "Daily operating system -- every activity must pass this filter."
