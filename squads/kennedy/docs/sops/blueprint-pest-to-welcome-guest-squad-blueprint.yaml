# Blueprint: Pest-to-Welcome-Guest Transformation Squad Blueprint
# Source: Magnetic Marketing Ch.7 + Ultimate Sales Letter Ch.8
# Squad: kennedy | Version: 1.0 | Date: 2026-02-11

---

metadata:
  name: "Pest-to-Welcome-Guest Transformation Blueprint"
  description: >
    Blueprint for transforming from an unwanted salesperson (pest) into
    a welcomed authority (welcome guest). Implements Kennedy's core
    philosophy of attraction over pursuit through Lead Generation Magnets,
    authority positioning, endorsed entry, and Show Up Like No One Else.
  version: "1.0"
# source_sop: sop-pest-to-welcome-guest.md
  created: "2026-02-11"
  squad: "kennedy"
  sop_reference: "sop-pest-to-welcome-guest.md"
  primary_agent: "kennedy-magnetic"
  mental_model: "Pest-to-Welcome-Guest + Show Up Like No One Else"
  source:
    books:
      - title: "Magnetic Marketing"
        chapters: [7, 8, 10]
      - title: "The Ultimate Sales Letter"
        chapters: [8]

# ---

# Agent Assignments

agents:
  lead:
    name: "kennedy-magnetic"
    role: "Transformation Architect"
    responsibilities:
      - "Diagnose current Pest Level"
      - "Design transformation strategy"
      - "Oversee Lead Gen Magnet creation"
      - "Coordinate Shock and Awe Package"

  support:
    - name: "kennedy-copy"
      role: "Content Creator"
      responsibilities:
        - "Write Lead Generation Magnets"
        - "Create email sequences"
        - "Craft authority content"
        - "Write Shock and Awe materials"

    - name: "kennedy-offers"
      role: "Offer Design"
      responsibilities:
        - "Design Widget for LGM context"
        - "Create consultation offer"
        - "Build Yes Ladder progression"

    - name: "kennedy-brand"
      role: "Authority Positioning"
      responsibilities:
        - "Rewrite bio as authority"
        - "Plan published content strategy"
        - "Design Show Up Like No One Else elements"

    - name: "kennedy-referrals"
      role: "Endorsed Entry"
      responsibilities:
        - "Implement Host-Beneficiary for entry"
        - "Coordinate Champion endorsements"
        - "Sub-blueprint: Host-Beneficiary"

    - name: "kennedy-media"
      role: "Distribution"
      responsibilities:
        - "Select and configure distribution channels"
        - "Build landing pages"
        - "Manage advertising for LGM"

# ---

# Workflow Phases

workflow:
  total_phases: 6
  estimated_duration: "6-12 weeks"
  parallel_work: true

  phases:
    - phase: 1
      name: "Current State Diagnosis"
      duration: "1-2 days"
      agent: "kennedy-magnetic"
      description: >
        Diagnose current position on the Pest-to-Welcome-Guest
        spectrum. Identify specific behaviors, perceptions, and
        systems that place you at your current level.

      inputs:
        - "Current sales process documentation"
        - "Marketing materials audit"
        - "Customer feedback data"
        - "Sales conversion data"

      tasks:
        - task: "pest-level-assessment"
          description: >
            Complete the 5-level self-assessment from SOP:
            - Level 1: PEST (cold outreach, high rejection)
            - Level 2: TOLERATED (accepted but not trusted)
            - Level 3: INFORMANT (source of information)
            - Level 4: ADVISOR (trusted counsel)
            - Level 5: WELCOME GUEST (invited authority)
            Mark all applicable behaviors per level.
          source: "sop-pest-to-welcome-guest.md, Step 1"

        - task: "rejection-audit"
          description: >
            Analyze current rejection/acceptance rates:
            - Cold outreach response rate
            - Meeting-to-close ratio
            - Price objection frequency
            - Referral rate (organic)
            - Repeat purchase rate

        - task: "gap-analysis"
          description: >
            Define the transformation gap:
            - Current level: ___
            - Target level: ___
            - Specific behaviors to STOP
            - Specific behaviors to START
            - Missing systems/assets

      outputs:
        - "Pest Level Score (1-5)"
        - "Rejection/acceptance metrics baseline"
        - "Transformation gap analysis"
        - "Priority action items"

      quality_gate:
        criteria:
          - "Honest assessment completed"
          - "Baseline metrics documented"
          - "Gap analysis with specific actions"
        reviewer: "kennedy-magnetic"

    - phase: 2
      name: "Lead Generation Magnet Creation"
      duration: "1-2 weeks"
      agent: "kennedy-copy"
      description: >
        Create the primary Lead Generation Magnet that
        transforms your first contact from pest to informant.
        This is the single most impactful change.

      inputs:
        - "WHO psychographic profile (5 Questions)"
        - "USP Statement"
        - "Industry expertise"
        - "Customer pain points and language"

      tasks:
        - task: "psychographic-discovery"
          description: >
            Answer Kennedy's 5 Psychographic Questions:
            1. What keeps them awake at night?
            2. What are they afraid of?
            3. What/who are they angry at?
            4. What are their 3 biggest daily frustrations?
            5. What trend is happening in their world?
          source: "Magnetic Marketing, pp. 64-65"

        - task: "lgm-title-creation"
          description: >
            Create 5-7 title candidates using tabloid templates:
            - "The N Errors..." template
            - "N Secrets..." template
            - "The Definitive Guide..." template
            - "The Truth About..." template
            - "Warning for [WHO]..." template
            Test each for curiosity, relevance, and urgency.
          source: "Magnetic Marketing, p. 107"

        - task: "lgm-content-writing"
          description: >
            Write LGM following 6-section structure:
            1. Headline + Author credibility
            2. Empathetic introduction (understand the pain)
            3. The Problem (amplify dissatisfaction - Job #2)
            4. Why common solutions fail
            5. The Solution framework (Job #3 + #4)
            6. Next step CTA (Job #4)
            RULE: Say WHAT not HOW (no overeducation)
          source: "sop-information-first-marketing.md"

        - task: "lgm-4-jobs-validation"
          description: >
            Validate LGM fulfills all 4 Jobs:
            Job 1: Does it generate response? (compelling)
            Job 2: Does it reinforce dissatisfaction? (pain)
            Job 3: Does it establish expertise + empathy?
            Job 4: Does it predispose to accept your recommendation?
          source: "Magnetic Marketing, pp. 102-108"

      outputs:
        - "Psychographic profile of WHO"
        - "Winning LGM title"
        - "Complete LGM content"
        - "4-Jobs validation checklist"

      quality_gate:
        criteria:
          - "Title passes tabloid test (would sell from rack)"
          - "Content fulfills all 4 Jobs"
          - "No overeducation (WHAT not HOW)"
          - "CTA leads to clear next step"
        reviewer: "kennedy-magnetic"

    - phase: 3
      name: "Authority System Construction"
      duration: "2-4 weeks"
      agent: "kennedy-brand"
      description: >
        Build the authority positioning system that moves
        you from informant to advisor to welcome guest.

      inputs:
        - "LGM from Phase 2"
        - "Professional credentials"
        - "Client results and testimonials"
        - "Industry knowledge"

      tasks:
        - task: "authority-bio-rewrite"
          description: >
            Rewrite professional bio as authority:
            - Focus on RESULTS delivered, not credentials
            - Lead with client transformations
            - Include published works
            - Mention speaking/teaching
            - Position as go-to expert in niche

        - task: "tier-1-authority-assets"
          description: >
            Create immediate authority assets (Week 1-2):
            - LGM (completed in Phase 2)
            - Self-Assessment Tool for WHO
            - 5 authority articles/posts
            - Updated professional profiles

        - task: "tier-2-authority-assets"
          description: >
            Create short-term authority assets (Week 2-4):
            - Deeper Special Report / White Paper
            - Email nurture series (5-7 parts)
            - 3 detailed case studies
            - 2-3 podcast/interview appearances

        - task: "show-up-differently-plan"
          description: >
            Design "Show Up Like No One Else" elements:
            - Visual differentiation (Al's suit approach)
            - Material quality upgrade
            - Unique delivery methods
            - Memorable first-impression elements
            - Customer experience differentiators
          source: "Magnetic Marketing, Cap. 8"

      outputs:
        - "Authority bio (new version)"
        - "Tier 1 authority assets (immediate)"
        - "Tier 2 authority assets (2-4 weeks)"
        - "Show Up Like No One Else plan"

      quality_gate:
        criteria:
          - "Bio focuses on results, not credentials"
          - "Tier 1 assets created and published"
          - "Show Up plan has 3+ differentiation elements"
        reviewer: "kennedy-brand"

    - phase: 4
      name: "Shock and Awe Package"
      duration: "1-2 weeks"
      agent: "kennedy-magnetic"
      description: >
        Create the Shock and Awe Package that overwhelms
        prospects with proof of authority and value.

      inputs:
        - "All authority assets from Phase 3"
        - "Testimonials and case studies"
        - "Product/service information"

      tasks:
        - task: "package-design"
          description: >
            Assemble Shock and Awe Package:
            Minimum (6 elements):
            1. Welcome letter (personal, handwritten feel)
            2. Lead Gen Magnet (the one they requested)
            3. Testimonials compilation (10+)
            4. FAQ / Objection Crusher
            5. Time-sensitive offer
            6. Detailed bio/credentials

            Ideal additions:
            7. Book or Special Report
            8. Video/audio content (USB)
            9. Newsletter sample
            10. Self-Assessment results
            11. Case studies booklet
            12. Media mentions compilation

            Premium additions (optional):
            13. Physical item (branded premium)
            14. Handwritten note
            15. Certificate or invitation
          source: "Magnetic Marketing, pp. 112-114"

        - task: "package-assembly"
          description: >
            Physical assembly:
            - Professional packaging/box
            - Logical content order
            - Visually impressive
            - Easy to consume
            - Branded but not salesy

        - task: "fulfillment-system"
          description: >
            Set up delivery system:
            - Within 24h of lead capture
            - Tracking with notification
            - Digital version for immediate access
            - Physical version for impact

      outputs:
        - "Shock and Awe Package (complete)"
        - "Fulfillment process documented"
        - "Cost per package calculated"
        - "Delivery timeline confirmed"

      quality_gate:
        criteria:
          - "Minimum 6 components"
          - "Visually impressive (WOW factor)"
          - "Deliverable within 24h"
          - "Cost per package within budget"
        reviewer: "kennedy-magnetic"

    - phase: 5
      name: "Distribution & Follow-Up System"
      duration: "2-3 weeks"
      agent: "kennedy-media"
      description: >
        Build the distribution channels for the LGM and
        the multi-step follow-up system that converts
        leads into clients.

      inputs:
        - "LGM from Phase 2"
        - "Shock and Awe Package from Phase 4"
        - "WHO targeting data"

      tasks:
        - task: "landing-page-creation"
          description: >
            Create squeeze page:
            - NO navigation, NO menu, NO distractions
            - Single purpose: capture contact for LGM
            - Headline from LGM title
            - 3-5 bullet points of what they'll learn
            - Simple form (name + email minimum)
          source: "Magnetic Marketing, pp. 108-109"

        - task: "ad-campaign-setup"
          description: >
            Configure advertising channels:
            - Online: Facebook/Instagram, LinkedIn, Google
            - Offline: Direct mail, print ads, postcards
            - Target: WHO definition from psychographic profile
            - Budget: Start small, scale what works

        - task: "email-sequence-creation"
          description: >
            Create 6-email nurture sequence:
            Email 1 (Day 0): LGM delivery
            Email 2 (Day 2): Key point amplification
            Email 3 (Day 4): Social proof / testimonial
            Email 4 (Day 7): Cost of inaction
            Email 5 (Day 10): Consultation offer
            Email 6 (Day 14): Final notice + deadline
          source: "sop-information-first-marketing.md"

        - task: "sales-process-redesign"
          description: >
            Redesign every touchpoint from pest to welcome guest:
            - First contact: Value offer (not pitch)
            - Second contact: Educational content
            - Meeting: Consultation/assessment (not pitch)
            - Proposal: Action plan + Widget
            - Follow-up: Relevant testimonial
            - Close: "When do you want to start?"

      outputs:
        - "Squeeze page (live)"
        - "Ad campaigns (configured)"
        - "Email sequence (built and tested)"
        - "Redesigned sales process"
        - "Team training materials"

      quality_gate:
        criteria:
          - "Squeeze page is truly simple (no distractions)"
          - "Email sequence follows 4-Jobs structure"
          - "Sales process is value-first at every step"
          - "Team trained on new approach"
        reviewer: "kennedy-magnetic"

    - phase: 6
      name: "Launch, Measure & Iterate"
      duration: "Ongoing (30-day initial cycle)"
      agent: "kennedy-chief"
      description: >
        Launch the complete Pest-to-Welcome-Guest system,
        measure results, and iterate based on data.

      inputs:
        - "All systems from Phases 1-5"
        - "Baseline metrics from Phase 1"

      tasks:
        - task: "system-launch"
          description: >
            Coordinated launch:
            - Activate ads
            - Activate landing page
            - Activate email sequence
            - Activate Shock and Awe fulfillment
            - Brief team on new process

        - task: "30-day-measurement"
          description: >
            Track at 30 days:
            - Inbound vs outbound lead ratio
            - LGM download rate
            - Email engagement rates
            - Consultation booking rate
            - Close rate from consultations
            - Average deal size
            - Price objection frequency
            - Referral rate
            Compare vs. baseline from Phase 1.

        - task: "pest-level-reassessment"
          description: >
            Reassess Pest Level after 30 days:
            - Where on spectrum now?
            - How does prospect treat you?
            - What's the dominant dynamic?
            Compare vs. Phase 1 diagnosis.

        - task: "optimization"
          description: >
            Based on data:
            - Improve LGM title/content (if low downloads)
            - Improve email sequence (if low engagement)
            - Improve consultation script (if low close)
            - Improve Shock and Awe (if low WOW factor)
            - Scale what works, fix what doesn't

      outputs:
        - "30-day performance report"
        - "Pest Level improvement score"
        - "Optimization plan"
        - "Scaling recommendations"
        - "60-day targets"

      quality_gate:
        criteria:
          - "Measurable improvement in Pest Level"
          - "Inbound leads growing"
          - "Price objections decreasing"
          - "Optimization plan documented"
        reviewer: "kennedy-chief"

# ---

# Quality Gates Summary

quality_gates:
  - gate: "Diagnosis Complete"
    phase: 1
    criteria: "Pest Level scored, baseline documented"
    blocker: true

  - gate: "LGM Created & Validated"
    phase: 2
    criteria: "4 Jobs fulfilled, no overeducation"
    blocker: true

  - gate: "Authority System Built"
    phase: 3
    criteria: "Bio + Tier 1 assets + Show Up plan"
    blocker: true

  - gate: "Shock and Awe Ready"
    phase: 4
    criteria: "6+ components, deliverable in 24h"
    blocker: true

  - gate: "Distribution Active"
    phase: 5
    criteria: "Landing page + ads + email + process redesigned"
    blocker: true

  - gate: "Improvement Measured"
    phase: 6
    criteria: "Pest Level improved, metrics positive"
    blocker: false

# ---

# Success Metrics

metrics:
  primary:
    - name: "Inbound Lead Ratio"
      target: "> 70% of leads come to you"
      measurement: "Track lead source"

    - name: "Rejection Rate"
      target: "< 10% of approaches rejected"
      measurement: "Track outreach responses"

    - name: "Consultation Close Rate"
      target: "> 40%"
      measurement: "Sales / Consultations"

  secondary:
    - name: "Price Objection Frequency"
      target: "< 15%"
      measurement: "Track in sales process"

    - name: "Average Deal Size"
      target: "> 30% above baseline"
      measurement: "Compare pre/post"

    - name: "Authority Recognition"
      target: "> 40% prospects mention your content"
      measurement: "Track in discovery call"

    - name: "Pest Level Score"
      target: "Improve at least 1 level per quarter"
      measurement: "Quarterly reassessment"

# ---

# Dependencies

dependencies:
  requires:
    - "blueprint-usp-construction-squad-blueprint.yaml"
    - "blueprint-widget-offer-squad-blueprint.yaml"
  enables:
    - "blueprint-host-beneficiary-squad-blueprint.yaml"
    - "blueprint-information-first-marketing-squad-blueprint.yaml"
  synergies:
    - "Host-Beneficiary provides endorsed entry (Mechanism #3)"
    - "Information First provides LGM implementation (Mechanism #1)"

# ---

# Risk Mitigation

risks:
  - risk: "Team resists abandoning cold outreach"
    probability: "high"
    impact: "high"
    mitigation: "Run parallel: new system alongside existing for 60 days; let results convince"

  - risk: "LGM doesn't attract enough leads initially"
    probability: "medium"
    impact: "medium"
    mitigation: "Test 3-5 title variations; adjust targeting; increase ad budget gradually"

  - risk: "Patience runs out before system gains traction"
    probability: "medium"
    impact: "high"
    mitigation: "Set realistic 90-day timeline; celebrate small wins; track leading indicators"

  - risk: "Authority content is too generic"
    probability: "medium"
    impact: "medium"
    mitigation: "Ultra-specific to WHO niche; use psychographic discovery questions"

  - risk: "Shock and Awe too expensive per unit"
    probability: "low-medium"
    impact: "medium"
    mitigation: "Calculate cost vs. LTV of acquired client; digital components reduce cost"
