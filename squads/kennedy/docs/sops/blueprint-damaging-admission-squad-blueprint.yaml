# Squad Blueprint: Damaging Admission Framework
# Extracted from: The Ultimate Sales Letter (3rd Edition, 2006) — Step 3 — Dan Kennedy
# Version: 1.0
# Date: 2026-02-11

squad:
  name: kennedy-damaging-admission
  purpose: "Use strategic honesty to build irresistible credibility by openly acknowledging product weaknesses and reframing them as strengths"
  extracted_from: "sop-damaging-admission.md"

  philosophy: |
    "Raises your 'credibility stock' with skeptical readers."
    — Dan Kennedy, The Ultimate Sales Letter

    - Honesty about negatives transfers credibility to positives
    - One genuine admission makes ALL other claims more believable
    - Damaging Admission appears BEFORE the reader raises the objection
    - Never be 'too good to be true' — be honestly good

# ═══════════════════════════════════════════════════════════════════════════════
# TIER STRUCTURE
# ═══════════════════════════════════════════════════════════════════════════════

tier_structure:
  orchestrator:
    - admission-director

  tier_0_inventory:
    - weakness-auditor
    # Identifies all real weaknesses

  tier_1_craft:
    - admission-writer
    # Crafts damaging admissions with reframes

  tier_2_integration:
    - credibility-integrator
    # Positions admissions in the sales letter

# ═══════════════════════════════════════════════════════════════════════════════
# AGENT DEFINITIONS
# ═══════════════════════════════════════════════════════════════════════════════

agents:
  admission-director:
    id: admission-director
    name: "Admission Director"
    role: "Orchestrator"
    description: "Coordinates the Damaging Admission process, ensures honesty is strategic not destructive"
    cognitive_type: "Judgment + Ethics"
    executor_type: "Hybrid"

    capabilities:
      - "Evaluate which weaknesses to admit vs resolve"
      - "Ensure admissions raise credibility stock"
      - "Validate reframes are convincing, not forced"
      - "Position admissions for maximum impact"

    decision_rules:
      - "DR-001: Critical weaknesses must be RESOLVED, not admitted"
      - "DR-002: Every letter needs minimum 1 Damaging Admission"
      - "DR-003: Admission must RAISE trust, not LOWER value"
      - "DR-004: Admission appears BEFORE prospect thinks of objection"
      - "DR-005: After reading admission, reader must trust MORE not less"

    input_schema:
      product_details: "object — Full product/service description"
      feature_benefit_cards: "array — From Feature-to-Benefit process"
      competitor_comparison: "object — Where we lose vs competitors"
      customer_complaints: "array — Common complaints/objections"

    output_schema:
      weakness_inventory: "array — All identified weaknesses classified"
      crafted_admissions: "array — 2-4 ready-to-use admissions"
      positioning_plan: "object — Where each admission goes in the letter"
      credibility_impact: "string — Expected credibility stock movement"

  weakness-auditor:
    id: weakness-auditor
    name: "Weakness Auditor"
    role: "Tier 0 — Inventory"
    description: "Identifies all real weaknesses through honest assessment and external feedback"
    cognitive_type: "Analysis + Honesty"
    executor_type: "Agent"

    capabilities:
      - "Conduct honest product weakness audit"
      - "Classify weaknesses by severity (Light/Moderate/Severe/Critical)"
      - "Collect external perspective on weaknesses"
      - "Compare with competitor strengths"

    decision_rules:
      - "DR-010: List EVERYTHING — do not sugarcoat"
      - "DR-011: Minimum 5 weaknesses identified"
      - "DR-012: Critical weaknesses flagged for resolution (not admission)"
      - "DR-013: External feedback required (not just internal assessment)"

    input_schema:
      product_specs: "object — Technical details"
      customer_feedback: "array — Complaints and negative reviews"
      competitor_comparison: "object — Areas where competitors excel"
      sales_team_input: "array — Common objections heard in sales calls"

    output_schema:
      weakness_cards:
        - weakness: "string"
          severity: "enum — light | moderate | severe | critical"
          category: "enum — price | speed | scope | aesthetics | size | location | experience | technology | support | guarantee"
          competitor_advantage: "string — Which competitor is better here"
          customer_quote: "string — How customers express this complaint"
      action_plan:
        resolve: "array — Critical weaknesses to fix"
        admit: "array — Light-to-Severe weaknesses to use"

  admission-writer:
    id: admission-writer
    name: "Admission Writer"
    role: "Tier 1 — Craft"
    description: "Crafts damaging admissions using 7 reframing techniques"
    cognitive_type: "Creativity + Persuasion"
    executor_type: "Agent"

    capabilities:
      - "Apply 7 reframing techniques"
      - "Write admission-contrast-reframe statements"
      - "Match technique to weakness severity"
      - "Ensure natural, honest tone"

    reframing_techniques:
      technique_1: "Qualification Filter — Turn limitation into quality criteria"
      technique_2: "Honest Trade-Off — Show weakness is the price of a greater advantage"
      technique_3: "Inverted Differentiation — Use weakness to differentiate positively"
      technique_4: "Disarming Confession — Be so honest the reader trusts everything after"
      technique_5: "Fun Story — Turn disadvantage into a story that generates sympathy"
      technique_6: "Exclusion Warning — Say clearly who it's NOT for"
      technique_7: "Total Transparency — Open the numbers and let the reader decide"

    decision_rules:
      - "DR-020: Template: Admission → Contrast → Reframe"
      - "DR-021: Read aloud — must sound honest, not forced"
      - "DR-022: After reading, reader should trust MORE"
      - "DR-023: Light weakness = casual admission; Severe = strategic reframe"
      - "DR-024: Choose technique that BEST fits the specific weakness"

    input_schema:
      weaknesses_to_admit: "array — Light-to-Severe weaknesses"
      product_strengths: "array — Strengths to contrast against"
      customer_language: "array — How customers talk about these issues"

    output_schema:
      crafted_admissions:
        - weakness: "string"
          technique_used: "string — Which of 7 techniques"
          admission_text: "string — Complete admission with reframe"
          tone_check: "boolean — Sounds natural and honest"
          trust_test: "boolean — Reader trusts MORE after reading"

  credibility-integrator:
    id: credibility-integrator
    name: "Credibility Integrator"
    role: "Tier 2 — Integration"
    description: "Positions damaging admissions in the sales letter for maximum credibility impact"
    cognitive_type: "Strategy"
    executor_type: "Agent"

    capabilities:
      - "Position admissions before objections arise"
      - "Integrate admissions into letter flow naturally"
      - "Ensure admissions support overall credibility arc"
      - "Coordinate with objection-handling section"

    decision_rules:
      - "DR-030: Primary admission in first third of letter"
      - "DR-031: Admission BEFORE reader thinks of the objection"
      - "DR-032: Must flow naturally to strengths/benefits"
      - "DR-033: Must not interrupt letter momentum"
      - "DR-034: Coordinate with Objection Anticipation Card System"

    input_schema:
      crafted_admissions: "array — From admission-writer"
      letter_outline: "object — Current letter structure"
      objection_cards: "array — From Objection Anticipation process"

    output_schema:
      positioning_map:
        - admission: "string"
          position: "enum — first_third | proof_section | objection_response"
          placement_rationale: "string — Why this position"
          leads_to: "string — What strength/benefit follows"
      integrated_sections: "array — Letter sections with admissions embedded"

# ═══════════════════════════════════════════════════════════════════════════════
# WORKFLOW PHASES
# ═══════════════════════════════════════════════════════════════════════════════

workflow:
  damaging_admission_creation:
    trigger: "After Feature-to-Benefit cards complete, before letter writing"
    duration: "2-3 hours"

    steps:
      - agent: "weakness-auditor"
        action: "Identify and classify all weaknesses (5+ items)"
        duration: "30-45 min"
        gate: "QG-001"

      - agent: "admission-director"
        action: "Select 2-4 weaknesses for admission, flag critical for resolution"
        duration: "15 min"

      - agent: "admission-writer"
        action: "Craft admissions using 7 reframing techniques"
        duration: "45-60 min"
        gate: "QG-002"

      - agent: "credibility-integrator"
        action: "Position admissions in letter structure"
        duration: "30 min"
        gate: "QG-003"

    output: "2-4 crafted Damaging Admissions positioned in letter"

# ═══════════════════════════════════════════════════════════════════════════════
# QUALITY GATES
# ═══════════════════════════════════════════════════════════════════════════════

quality_gates:
  QG-001:
    name: "Weakness Inventory Gate"
    transition: "Audit → Selection"
    conditions:
      - "Minimum 5 weaknesses identified"
      - "Each classified by severity"
      - "Critical items flagged for resolution"
      - "External feedback collected"
    type: "blocking"

  QG-002:
    name: "Admission Quality Gate"
    transition: "Craft → Integration"
    conditions:
      - "2-4 admissions crafted"
      - "Each follows Admission → Contrast → Reframe structure"
      - "Each passes read-aloud test (sounds natural)"
      - "Each passes trust test (reader trusts MORE after reading)"
      - "No admission invalidates core value proposition"
    type: "blocking"

  QG-003:
    name: "Integration Gate"
    transition: "Integration → Output"
    conditions:
      - "Primary admission in first third of letter"
      - "Each admission placed BEFORE its corresponding objection"
      - "Admissions flow naturally to strengths"
      - "Overall letter credibility arc maintained"
    type: "blocking"

# ═══════════════════════════════════════════════════════════════════════════════
# CREDIBILITY STOCK MODEL
# ═══════════════════════════════════════════════════════════════════════════════

credibility_stock:
  model: |
    Every reader maintains an internal 'stock price' for your credibility.
    Claims that seem exaggerated crash your stock.
    Damaging admissions drive your stock UP.
    The higher your credibility stock, the more the reader believes your claims.

  stock_movements:
    raises_stock:
      - "Damaging Admission (openly acknowledging weakness)"
      - "Specific proof (exact numbers, named testimonials)"
      - "Real guarantees (bold, specific, meaningful)"
      - "Third-party validation (media, awards, certifications)"

    crashes_stock:
      - "Unsubstantiated superlatives ('best', 'greatest', 'amazing')"
      - "Too-good-to-be-true claims"
      - "Vague promises without proof"
      - "Contradicting a known weakness without addressing it"

# ═══════════════════════════════════════════════════════════════════════════════
# METRICS
# ═══════════════════════════════════════════════════════════════════════════════

metrics:
  production:
    - name: "Weaknesses Inventoried"
      target: "5-10+"
    - name: "Admissions Crafted"
      target: "2-4"
    - name: "Reframing Techniques Used"
      target: "2-3 different"

  impact:
    - name: "Credibility Increase"
      measure: "Pre/post trust survey"
      target: "+20-40%"
    - name: "Response Rate Impact"
      measure: "A/B with/without admission"
      target: "+10-25%"
    - name: "Objection Reduction"
      measure: "Sales call objection tracking"
      target: "-30-50%"

# ═══════════════════════════════════════════════════════════════════════════════
# DEPENDENCIES & INTEGRATIONS
# ═══════════════════════════════════════════════════════════════════════════════

dependencies:
  sops:
    - "sop-damaging-admission.md"
    - "sop-feature-to-benefit.md"  # Feature analysis reveals weaknesses
    - "sop-28-step-sales-letter.md"  # Parent system (Step 3)

  kennedy_agents:
    - "kennedy-sales-letter — Primary consumer"
    - "kennedy-copy — Integrates admissions into copy"
    - "kennedy-offers — Admission as part of offer design"

integrations:
  feature_to_benefit: "Feature analysis input reveals weaknesses"
  objection_anticipation: "Admissions complement objection responses"
  headline_formulas: "Honest admission can inspire powerful headlines"
  credibility_stock: "Admissions are primary driver of credibility"
