# ---

# Risk Mitigation

risks:
  - risk: "LGM title doesn't attract enough downloads"
    probability: "medium"
    impact: "high"
    mitigation: "Test 5-7 titles before scaling; use tabloid formula"

  - risk: "Email sequence feels too salesy"
    probability: "medium"
    impact: "medium"
    mitigation: "70/30 rule: 70% genuine value, 30% persuasion"

  - risk: "Overeducation (teaching HOW, losing need for you)"
    probability: "medium"
    impact: "high"
    mitigation: "Content review by kennedy-magnetic enforcing WHAT-not-HOW rule"

  - risk: "Landing page distractions reduce conversion"
    probability: "low"
    impact: "high"
    mitigation: "Squeeze page rule: zero navigation, zero links out"

  - risk: "Content fatigue over time"
    probability: "medium"
    impact: "medium"
    mitigation: "Quarterly LGM refresh; new angles; new formats"

  - risk: "Ad costs escalate beyond profitability"
    probability: "medium"
    impact: "high"
    mitigation: "Weekly CPL monitoring; kill underperformers fast; diversify organic"
