# ═══════════════════════════════════════════════════════════════════════════════
# DEPENDENCIES & INTEGRATIONS
# ═══════════════════════════════════════════════════════════════════════════════

dependencies:
  sops:
    - "sop-28-step-sales-letter.md"
    - "sop-headline-formulas.md"
    - "sop-feature-to-benefit.md"
    - "sop-damaging-admission.md"
    - "sop-objection-anticipation.md"
    - "sop-grabber-lumpy-mail.md"

  kennedy_agents:
    - "kennedy-sales-letter — Primary specialist"
    - "kennedy-copy — Copywriting support"
