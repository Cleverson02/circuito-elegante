  - id: "MM-SL-03"
    name: "Pest to Welcome Guest"
    application: "Headline creation (Step 6)"

  - id: "MM-SL-04"
    name: "Scissors and Tape"
    application: "Draft writing method (Step 9)"

  - id: "MM-SL-05"
    name: "Credibility Stock Market"
    application: "Damaging Admissions and proof (Steps 3, 8)"

  - id: "MM-SL-06"
    name: "3x5 Card System"
    application: "Brainstorming and organizing (Steps 1-3, 12)"

  - id: "MM-SL-07"
    name: "Never Be Half Pregnant"
    application: "Envelope strategy commitment (Steps 4-5)"

  - id: "MM-SL-08"
