# ═══════════════════════════════════════════════════════════════════════════════
# METRICS
# ═══════════════════════════════════════════════════════════════════════════════

metrics:
  comparison:
    regular_mail:
      open_rate: "30-50%"
      read_rate: "10-30%"
      response_cold: "1-2%"
      response_warm: "5-10%"
      cost_per_piece: "$0.50-$2.00"

    lumpy_mail:
      open_rate: "80-95%"
      read_rate: "50-80%"
      response_cold: "3-8%"
      response_warm: "15-35%"
      cost_per_piece: "$5.00-$50.00"

    improvement:
      open_rate: "+50-100%"
      read_rate: "+100-300%"
      response_rate: "+200-400%"
      cost_per_response: "Often lower despite higher per-piece cost"

