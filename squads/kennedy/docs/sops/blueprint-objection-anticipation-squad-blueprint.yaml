# Squad Blueprint: Objection Anticipation Card System
# Extracted from: The Ultimate Sales Letter (3rd Edition, 2006) — Step 12 — Dan Kennedy
# Version: 1.0
# Date: 2026-02-11

squad:
  name: kennedy-objection-system
  purpose: "Systematically identify and neutralize every reason a prospect might NOT respond, using the 3x5 card system and Q&A format to crush objections before they arise"
  extracted_from: "sop-objection-anticipation.md"

  philosophy: |
    "If the prospect says 'I'm not interested', that is an objection
    you must anticipate and answer in the letter."
    — Dan Kennedy, The Ultimate Sales Letter

    - Every possible reason NOT to respond must be addressed
    - Proactive beats reactive — answer before they ask
    - Q&A format mimics natural sales conversation
    - 'Not interested' is an objection, not a final answer

# ═══════════════════════════════════════════════════════════════════════════════
# TIER STRUCTURE
# ═══════════════════════════════════════════════════════════════════════════════

tier_structure:
  orchestrator:
    - objection-director

  tier_0_research:
    - objection-miner
    # Exhaustive identification from all sources

  tier_1_craft:
    - response-writer
    - qa-formatter
    # Response creation and Q&A structuring

  tier_2_integration:
    - letter-integrator
    # Positioning responses in the sales letter

# ═══════════════════════════════════════════════════════════════════════════════
# AGENT DEFINITIONS
# ═══════════════════════════════════════════════════════════════════════════════

agents:
  objection-director:
    id: objection-director
    name: "Objection Director"
    role: "Orchestrator"
    description: "Coordinates objection identification, response crafting, and integration into the sales letter"
    cognitive_type: "Judgment + Strategy"
    executor_type: "Hybrid"

    capabilities:
      - "Prioritize objections by frequency and strength"
      - "Assign objections to appropriate letter sections"
      - "Validate responses are assertive not defensive"
      - "Ensure complete coverage — no objection left unanswered"

    decision_rules:
      - "DR-001: Minimum 10 objections identified — no exceptions"
      - "DR-002: Top 3 objections MUST be in letter body, not just Q&A"
      - "DR-003: 'Not interested' is always treated as an objection"
      - "DR-004: Every response needs at least 1 proof element"
      - "DR-005: Responses must be assertive, NEVER defensive"

    input_schema:
      product_details: "object — What is being sold"
      customer_profile: "object — 10 Smart Questions answers"
      sales_team_feedback: "array — Common objections heard"
      competitor_data: "object — Competitor strengths/weaknesses"

    output_schema:
      objection_cards: "array — Complete card deck (10-25)"
      response_set: "array — One response per objection"
      qa_section: "string — Formatted Q&A section"
      integration_map: "object — Where each response goes in letter"

  objection-miner:
    id: objection-miner
    name: "Objection Miner"
    role: "Tier 0 — Research"
    description: "Exhaustively identifies all possible reasons for not responding from 8 source types"
    cognitive_type: "Analysis + Empathy"
    executor_type: "Agent"

    capabilities:
      - "Mine objections from 8 source types"
      - "Classify into 5 barrier categories"
      - "Cross-reference with 20 Universal Objections"
      - "Prioritize by frequency and impact"

    sources:
      1: "Personal sales experience"
      2: "Sales team feedback"
      3: "Customer service complaints"
      4: "Negative reviews (yours and competitors)"
      5: "Smart Question #9 (competitor landscape)"
      6: "Smart Question #10 (failed approaches)"
      7: "Personal skepticism exercise"
      8: "Secondary decision-maker objections"

    categories:
      objections: "Logical reasons against"
      concerns: "Worries about risk"
      fears: "Emotional barriers"
      doubts: "Credibility questions"
      excuses: "Rationalizations for inaction"

    decision_rules:
      - "DR-010: Consult minimum 5 of 8 sources"
      - "DR-011: Cross-check against 20 Universal Objections"
      - "DR-012: One objection per card — no combining"
      - "DR-013: Target 15-25 objections"
      - "DR-014: Include secondary decision-maker objections"

    input_schema:
      customer_profile: "object — 10 Smart Questions"
      sales_call_recordings: "array — Transcripts or notes"
      customer_reviews: "array — Positive and negative"
      competitor_marketing: "array — Competitor sales materials"

    output_schema:
      objection_cards:
        - objection: "string — In prospect's language"
          category: "enum — objections | concerns | fears | doubts | excuses"
          frequency: "enum — top3 | common | rare"
          source: "string — Where this was identified"
          prospect_language: "string — Exact words prospect would use"
      total_count: "number — Should be 15-25"
      category_distribution: "object — Count per category"

  response-writer:
    id: response-writer
    name: "Response Writer"
    role: "Tier 1 — Craft"
    description: "Writes neutralization responses for each objection using the RECA template"
    cognitive_type: "Creativity + Persuasion"
    executor_type: "Agent"

    capabilities:
      - "Apply RECA template (Recognize, Reframe, Prove, Conclude)"
      - "Match proof type to objection category"
      - "Write in prospect language, not seller language"
      - "Create self-sufficient responses (each works standalone)"

    reca_template:
      R_recognize: "Acknowledge the objection without dismissing it"
      E_reframe: "Present new perspective that changes the equation"
      C_prove: "Support with testimonial, number, or case study"
      A_conclude: "Close with benefit that overcomes the objection"

    neutralization_techniques:
      price: ["value comparison", "ROI calculation", "cost of inaction", "unit division", "payment plan"]
      risk: ["guarantee", "dual guarantee", "specific testimonial", "trial period", "partial results"]
      time: ["real deadline", "cost of delay", "simplicity proof", "flexible scheduling", "genuine scarcity"]
      credibility: ["damaging admission", "mass social proof", "specific numbers", "third-party validation", "transparency"]
      relevance: ["flagging", "similar case study", "personalization", "direct comparison", "cost of disinterest"]

    decision_rules:
      - "DR-020: Follow RECA template for every response"
      - "DR-021: Minimum 1 proof element per response"
      - "DR-022: Prospect language dominates, not seller language"
      - "DR-023: Each response must be self-sufficient"
      - "DR-024: Assertive tone — NEVER defensive"

    input_schema:
      objection_cards: "array — From objection-miner"
      proof_elements: "object — Available testimonials, numbers, cases"
      guarantee_structure: "object — Available guarantees"
      benefit_cards: "array — From Feature-to-Benefit process"

    output_schema:
      responses:
        - objection: "string"
          response_text: "string — Complete RECA response"
          proof_type: "enum — testimonial | number | case_study | guarantee"
          tone_check: "boolean — Assertive not defensive"
          standalone: "boolean — Works without context"

  qa-formatter:
    id: qa-formatter
    name: "Q&A Formatter"
    role: "Tier 1 — Craft"
    description: "Structures objection responses into Q&A format inspired by Darin Garman method"
    cognitive_type: "Synthesis + Organization"
    executor_type: "Agent"

    capabilities:
      - "Convert responses into natural Q&A dialogue"
      - "Sequence questions from most to least urgent"
      - "Build progressive trust through Q&A flow"
      - "Create transition from last Q&A to CTA"

    decision_rules:
      - "DR-030: Questions in prospect language, not formal"
      - "DR-031: Most urgent objection first"
      - "DR-032: Each answer builds on previous"
      - "DR-033: Final question transitions to CTA"
      - "DR-034: Q&A section for 5-8 objections"

    input_schema:
      responses: "array — From response-writer (objections #4-8)"
      cta_details: "object — What action to take"

    output_schema:
      qa_section: "string — Formatted Q&A ready for letter"
      question_count: "number — 5-8"
      transition_to_cta: "string — How last Q&A connects to action"

  letter-integrator:
    id: letter-integrator
    name: "Letter Integrator"
    role: "Tier 2 — Integration"
    description: "Positions objection responses in optimal locations throughout the sales letter"
    cognitive_type: "Strategy"
    executor_type: "Agent"

    capabilities:
      - "Place top 3 objections in letter body"
      - "Insert Q&A section in optimal position"
      - "Route risk objections to guarantee section"
      - "Route price objections to offer section"
      - "Place remaining objections in P.S."

    decision_rules:
      - "DR-040: Top 3 objections in letter BODY — not just Q&A"
      - "DR-041: Risk objections → guarantee section"
      - "DR-042: Price objections → offer section"
      - "DR-043: Q&A section after benefits, before CTA"
      - "DR-044: P.S. addresses 1-2 residual objections"
      - "DR-045: Damaging Admissions handle credibility objections"

    input_schema:
      all_responses: "array — Complete response set"
      qa_section: "string — Formatted Q&A"
      letter_outline: "object — Current letter structure"
      damaging_admissions: "array — From Damaging Admission process"

    output_schema:
      integration_map:
        body_objections: "array — Top 3 with insertion point"
        qa_section_position: "string — Where in letter"
        guarantee_objections: "array — Risk objections for guarantee"
        offer_objections: "array — Price objections for offer"
        ps_objections: "array — Residual for P.S."
        admission_objections: "array — Handled by Damaging Admission"

# ═══════════════════════════════════════════════════════════════════════════════
# WORKFLOW PHASES
# ═══════════════════════════════════════════════════════════════════════════════

workflow:
  objection_anticipation:
    trigger: "After Feature-to-Benefit and Damaging Admission processes"
    duration: "3-4 hours"

    steps:
      - agent: "objection-miner"
        action: "Identify 15-25 objections from 8 sources"
        duration: "45-60 min"
        gate: "QG-001"

      - agent: "objection-director"
        action: "Classify, prioritize, and assign to sections"
        duration: "20 min"

      - agent: "response-writer"
        action: "Write RECA responses for all objections"
        duration: "60-90 min"
        gate: "QG-002"

      - agent: "qa-formatter"
        action: "Structure Q&A section from objections #4-8"
        duration: "30 min"

      - agent: "letter-integrator"
        action: "Position all responses in letter structure"
        duration: "30 min"
        gate: "QG-003"

    output: "Complete objection handling integrated into sales letter"

# ═══════════════════════════════════════════════════════════════════════════════
# QUALITY GATES
# ═══════════════════════════════════════════════════════════════════════════════

quality_gates:
  QG-001:
    name: "Objection Volume Gate"
    transition: "Mining → Prioritization"
    conditions:
      - "Minimum 10 objections identified (target 15-25)"
      - "All 5 categories represented"
      - "At least 5 of 8 sources consulted"
      - "'Not interested' included as objection"
    type: "blocking"

  QG-002:
    name: "Response Quality Gate"
    transition: "Writing → Formatting"
    conditions:
      - "100% of objections have written response"
      - "Each response follows RECA template"
      - "Each response has 1+ proof element"
      - "All responses assertive (not defensive)"
      - "Prospect language used throughout"
    type: "blocking"

  QG-003:
    name: "Integration Gate"
    transition: "Integration → Output"
    conditions:
      - "Top 3 objections in letter body"
      - "Q&A section structured and positioned"
      - "Risk objections routed to guarantee"
      - "Price objections routed to offer"
      - "No objection left unaddressed in final letter"
    type: "blocking"

# ═══════════════════════════════════════════════════════════════════════════════
# 20 UNIVERSAL OBJECTIONS REFERENCE
# ═══════════════════════════════════════════════════════════════════════════════

universal_objections:
  price:
    - "It's too expensive"
    - "I don't have the money right now"
    - "I can find cheaper"
    - "Competitor X charges less"

  risk:
    - "What if it doesn't work for me?"
    - "What if I don't like it?"
    - "What if I regret it?"
    - "Seems too good to be true"

  time:
    - "I don't have time right now"
    - "Maybe next month"
    - "I need to think about it"
    - "I need to consult my [spouse/partner/team]"

  credibility:
    - "Who are you?"
    - "Why should I trust you?"
    - "Do you have experience in my niche?"
    - "Where's the proof?"

  relevance:
    - "This isn't for me"
    - "My situation is different"
    - "I tried something similar and it didn't work"
    - "I'm not interested"

# ═══════════════════════════════════════════════════════════════════════════════
# METRICS
# ═══════════════════════════════════════════════════════════════════════════════

metrics:
  production:
    - name: "Objections Identified"
      target: "15-25"
      minimum: "10"
    - name: "Responses Written"
      target: "100% coverage"
    - name: "Proof Elements"
      target: "1+ per response"

  impact:
    - name: "Response Rate Improvement"
      baseline: "Without objection handling"
      target: "+15-30%"
    - name: "Sales Call Objection Reduction"
      target: "-40-60%"
    - name: "Decision Time"
      target: "-30-50%"

# ═══════════════════════════════════════════════════════════════════════════════
# DEPENDENCIES & INTEGRATIONS
# ═══════════════════════════════════════════════════════════════════════════════

dependencies:
  sops:
    - "sop-objection-anticipation.md"
    - "sop-damaging-admission.md"  # Handles credibility objections
    - "sop-feature-to-benefit.md"  # Benefits form response foundation
    - "sop-28-step-sales-letter.md"  # Parent system (Step 12)

  kennedy_agents:
    - "kennedy-sales-letter — Primary consumer"
    - "kennedy-copy — Integrates responses into copy"
    - "kennedy-offers — Guarantee design for risk objections"

integrations:
  damaging_admission: "Credibility objections handled via admission framework"
  feature_to_benefit: "Benefits are the ammunition for objection responses"
  headline_formulas: "Objections can inspire 'Are You...?' headlines"
  grabber_lumpy_mail: "Physical grabbers overcome 'won't open mail' objection"
  guarantee_design: "Risk objections drive guarantee structure"
