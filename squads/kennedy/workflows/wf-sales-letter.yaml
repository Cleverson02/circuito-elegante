# Sales Letter Creation Workflow
# Based on Dan Kennedy's Ultimate Sales Letter — 28-Step System
# Source: The Ultimate Sales Letter (3rd Ed, 2006) + Copywriting Academy
# Version: 1.0.0

id: wf-sales-letter
name: "Sales Letter Creation"
version: "1.0.0"
duration: "2-3 days"
description: |
  Complete workflow to create a high-converting sales letter using
  Dan Kennedy's proven 28-Step System. Takes a product/service through
  market research, headline creation, body copy, offer construction,
  and final audit before deployment.

  PHILOSOPHY: "Nobody reads anything — they read what interests THEM."

  RESULT: A complete, mailable sales letter with headline, body copy,
  irresistible offer, guarantee, P.S. lines, and response mechanism
  ready for deployment.

# ===============================================================================
# WHEN TO USE THIS WORKFLOW
# ===============================================================================

best_for:
  - "Creating a long-form sales letter from scratch"
  - "Converting a weak sales page into a Kennedy-style direct response piece"
  - "Launching a new product or service with direct mail"
  - "Creating an online sales page using Kennedy's DR principles"
  - "Reviving a dead product with a fresh sales letter"

decision_matrix_fit:
  complexity: high
  agents_required: 5
  estimated_duration: "2-3 days"
  user_involvement: "medium (checkpoints require approval)"
  prerequisites:
    - "Clear product or service to sell"
    - "Understanding of target market"
    - "Price point determined"
    - "Basic USP concept (or willing to develop one)"

# ===============================================================================
# AGENTS INVOLVED
# ===============================================================================

clone_combinations:
  primary:
    - agent: kennedy-chief
      role: "Orchestration, Results Triangle validation, strategic oversight"
      phases: [0]

    - agent: kennedy-sales-letter
      role: "28-Step System execution, headline formulas, copy structure"
      phases: [1, 2]

    - agent: kennedy-copy
      role: "Fascination bullets, body copy, emotional triggers"
      phases: [2, 3]

    - agent: kennedy-offers
      role: "USP creation, offer construction, guarantee design, widgets"
      phases: [1, 3]

    - agent: kennedy-audit
      role: "Marketing audit, 10 No B.S. Rules compliance, final review"
      phases: [4]

  synergies:
    - agents: [kennedy-sales-letter, kennedy-copy]
      pattern: "Sales Letter provides structure (28 steps), Copy fills with fascination and emotional power"

    - agents: [kennedy-sales-letter, kennedy-offers]
      pattern: "Sales Letter builds desire, Offers closes with irresistible value stack"

    - agents: [kennedy-audit, kennedy-sales-letter]
      pattern: "Audit validates letter against 10 No B.S. Rules and A-Pile/B-Pile criteria"

# ===============================================================================
# PHASE 0: DISCOVERY — Results Triangle
# ===============================================================================

phases:
  - id: PHASE-0
    name: "Discovery"
    days: "Day 0"
    tier: 0
    description: |
      Apply the Results Triangle to establish the foundation.
      RIGHT Message + RIGHT Market + RIGHT Media = Results.
      Before writing a single word, know WHO you are writing to,
      WHAT they desperately want, and HOW this letter will reach them.

      PRINCIPLE: "The letter is NOT about your product. It's about
      the prospect's problem and your solution to THEIR problem."

    agent: kennedy-chief

    tasks:
      - task_id: T0.1
        name: "Define Target Market (RIGHT Market)"
        required: true
        description: |
          WHO — Identify the target with radical specificity.
          Demographics + psychographics + buying behavior.
          Where are they on the Money Pyramid?
          What keeps them awake at 3 AM?
        output: "target_market_profile.yaml"

      - task_id: T0.2
        name: "Craft Core Message (RIGHT Message)"
        required: true
        description: |
          WHAT — What is the ONE compelling message?
          What is the Big Promise? What transformation do you deliver?
          What makes this different from everything else they have tried?
        output: "core_message.md"

      - task_id: T0.3
        name: "Select Delivery Media (RIGHT Media)"
        required: true
        description: |
          HOW — Will this be direct mail, email, landing page, or multi-channel?
          A-Pile or B-Pile? Grabber mail? Dimensional package?
          Media choice affects copy length, format, and tone.
        output: "media_selection.yaml"

      - task_id: T0.4
        name: "Establish USP Foundation"
        required: true
        description: |
          WHY YOU — What is the Unique Selling Proposition?
          Why should the prospect choose you over every other option
          including doing nothing? Use Kennedy's 4 USP Pathways.
        output: "usp_foundation.md"

    checkpoint:
      id: CP_PHASE_0
      name: "Results Triangle Complete"
      criteria:
        - "Target market defined with demographics + psychographics"
        - "Core message articulated in one clear sentence"
        - "Media channel selected with rationale"
        - "USP foundation established (at least draft)"
      human_review: true
      message: "Review the Results Triangle foundation before proceeding to headline creation."
      veto_conditions:
        - condition: "Target market too broad (e.g., 'everyone who needs X')"
          action: "HALT - Narrow down to a starving crowd"
        - condition: "No clear USP differentiation"
          action: "BLOCK - Cannot write compelling copy without USP"

  # ===============================================================================
  # PHASE 1: ARCHITECTURE — Headline + Structure
  # ===============================================================================

  - id: PHASE-1
    name: "Architecture"
    days: "Day 1"
    tier: 1
    description: |
      Create the headline (the most important element — if the headline
      fails, nothing else matters) and map the complete letter structure
      using the 28-Step System.

      PRINCIPLE: "On average, 5 times as many people read the headline
      as read the body copy. When you have written your headline, you
      have spent 80 cents of your dollar."

    agent: kennedy-sales-letter

    tasks:
      - task_id: T1.1
        name: "Create 20+ Headline Candidates"
        required: true
        description: |
          Use Kennedy's 12 Fill-in-the-Blank Headline Formulas.
          Generate at least 20 headline variations. Include:
          - Benefit-driven headlines
          - Curiosity headlines
          - News-style headlines
          - Question headlines
          - Command headlines
          Test each against the A-Pile/B-Pile criterion:
          Would this headline land the letter in the A-Pile?
        output: "headline_candidates.md"

      - task_id: T1.2
        name: "Map the 28-Step Structure"
        required: true
        description: |
          Map all 28 steps of the Kennedy Sales Letter System:
          1. Get "Ready" (research phase)
          2-6. Define prospect demographics and psychographics
          7-8. Create the Big Promise + Proof
          9-14. Build body copy structure (problem-agitate-solve)
          15-20. Construct the offer section
          21-25. Add urgency, scarcity, guarantee
          26-28. P.S., response mechanism, final review
        output: "letter_structure_map.md"

      - task_id: T1.3
        name: "Draft USP and Offer Skeleton"
        required: true
        description: |
          Working with kennedy-offers, create the offer skeleton:
          - Main offer
          - Bonus stack
          - Guarantee type (risk reversal, better-than-risk-reversal)
          - Urgency mechanism
          - Premium / widget concept
        output: "offer_skeleton.yaml"

    handoff:
      from: kennedy-sales-letter
      to: kennedy-copy
      template: templates/handoff-context-tmpl.yaml
      required_data:
        - "Winning headline selected"
        - "28-Step structure mapped"
        - "Offer skeleton complete"

    checkpoint:
      id: CP_PHASE_1
      name: "Architecture Complete"
      criteria:
        - "Headline selected from 20+ candidates"
        - "28-Step structure fully mapped"
        - "Offer skeleton approved by user"
      human_review: true
      message: "Review headline selection and letter structure before body copy."
      veto_conditions:
        - condition: "Headline does not pass A-Pile test"
          action: "BLOCK - Rewrite headlines until one commands A-Pile attention"
        - condition: "Fewer than 20 headline candidates generated"
          action: "BLOCK - Kennedy demands volume before selection"

  # ===============================================================================
  # PHASE 2: COPY — Body Copy + Fascination
  # ===============================================================================

  - id: PHASE-2
    name: "Copy"
    days: "Day 1-2"
    tier: 2
    description: |
      Write the complete body copy following the 28-Step structure.
      Layer in fascination bullets, emotional triggers, proof elements,
      and the irresistible offer.

      PRINCIPLE: "All selling is the transference of feeling. If you
      don't feel passionately about what you sell, go sell something else."

    agent: kennedy-copy

    tasks:
      - task_id: T2.1
        name: "Write Opening (Hook + Problem)"
        required: true
        description: |
          The opening must grab attention immediately after the headline.
          Use the Pest-to-Welcome-Guest technique: enter the conversation
          already happening in the prospect's mind. Agitate the problem
          until they are desperate for the solution.
        output: "copy_opening.md"

      - task_id: T2.2
        name: "Write Body (Story + Proof + Transformation)"
        required: true
        description: |
          Build the case with story, credibility, and proof.
          Include: testimonials, case studies, demonstrations, credentials,
          specifics (not vague claims). Use fascination bullets liberally.
          Every paragraph must earn the next paragraph.
        output: "copy_body.md"

      - task_id: T2.3
        name: "Create Fascination Bullet Set"
        required: true
        description: |
          Write 30+ fascination bullets using Kennedy's Fascination System.
          Types: blind fascination, revelation, contrarian, specificity,
          curiosity, fear, how-to, secret, warning.
          These are the "seasoning" that makes the letter irresistible.
        output: "fascination_bullets.md"

      - task_id: T2.4
        name: "Write Close + Call to Action"
        required: true
        description: |
          Construct the close: summarize the offer, restate the guarantee,
          add urgency and scarcity, write the call to action.
          Include multiple P.S. lines (Kennedy says most people read the
          P.S. before the body — treat each P.S. as a mini-sales letter).
        output: "copy_close.md"

    checkpoint:
      id: CP_PHASE_2
      name: "Copy Complete"
      criteria:
        - "Complete draft follows 28-Step structure"
        - "Minimum 30 fascination bullets created"
        - "Proof elements included (testimonials, case studies, specifics)"
        - "Close includes guarantee + urgency + clear CTA"
      human_review: false
      message: "Copy draft complete. Moving to offer assembly."
      veto_conditions:
        - condition: "Copy uses institutional/brand language instead of DR language"
          action: "REWRITE - Kennedy demands measurable, response-driven copy"
        - condition: "No fascination bullets in letter"
          action: "BLOCK - Add fascination bullets before proceeding"

  # ===============================================================================
  # PHASE 3: OFFER ASSEMBLY — Irresistible Offer Construction
  # ===============================================================================

  - id: PHASE-3
    name: "Offer Assembly"
    days: "Day 2"
    tier: 2
    description: |
      Assemble the complete irresistible offer: main product, bonuses,
      guarantee, premiums/widgets, urgency mechanism. The offer must be
      so compelling that a reasonable person would feel stupid saying no.

      PRINCIPLE: "The best direct mail in the world won't save a bad offer,
      but a great offer can survive mediocre copy."

    agent: kennedy-offers

    tasks:
      - task_id: T3.1
        name: "Build the Offer Stack"
        required: true
        description: |
          Assemble the complete offer with perceived value anchoring:
          - Main product/service with clear value
          - Bonus #1 (solves adjacent problem)
          - Bonus #2 (accelerates results)
          - Bonus #3 (eliminates common excuse)
          - Premium/Widget (tangible, keep-regardless item)
          Total perceived value must dwarf the asking price.
        output: "offer_stack.yaml"

      - task_id: T3.2
        name: "Design the Guarantee"
        required: true
        description: |
          Create a guarantee that reverses all risk:
          - Standard guarantee (money-back)
          - Better-than-risk-reversal guarantee (keep everything + refund)
          - Conditional guarantee (specific result or refund)
          Kennedy: "If you truly believe in your product, offer
          the strongest possible guarantee."
        output: "guarantee_design.md"

      - task_id: T3.3
        name: "Create Widget/Premium Concept"
        required: true
        description: |
          Design a tangible "widget" — something physical they can hold.
          Kennedy: "People will respond more to a free widget than
          a discount. The widget is the bribe."
          Examples: toolkit, calculator, checklist card, physical book.
        output: "widget_concept.md"

      - task_id: T3.4
        name: "Integrate Offer into Letter"
        required: true
        description: |
          Merge the offer stack into the sales letter copy.
          Ensure seamless transition from body to offer.
          Price anchoring, value stacking, deadline, and response
          mechanism all integrated.
        output: "final_sales_letter_draft.md"

    handoff:
      from: kennedy-offers
      to: kennedy-audit
      template: templates/handoff-context-tmpl.yaml
      required_data:
        - "Complete sales letter draft"
        - "Offer stack with value anchoring"
        - "Guarantee designed"
        - "Widget/premium concept"

    checkpoint:
      id: CP_PHASE_3
      name: "Offer Assembly Complete"
      criteria:
        - "Offer stack has main product + minimum 3 bonuses"
        - "Guarantee designed with risk reversal"
        - "Widget/premium concept ready"
        - "Full letter draft assembled"
      human_review: true
      message: "Review the complete offer and letter draft before final audit."
      veto_conditions:
        - condition: "No guarantee included in offer"
          action: "BLOCK - Kennedy demands risk reversal on every offer"
        - condition: "No premium/widget in offer"
          action: "WARNING - Consider adding tangible premium for higher response"

  # ===============================================================================
  # PHASE 4: AUDIT — 10 No B.S. Rules Compliance
  # ===============================================================================

  - id: PHASE-4
    name: "Audit"
    days: "Day 2-3"
    tier: 3
    description: |
      Final audit against Kennedy's 10 No B.S. Rules of Direct Marketing.
      Check A-Pile/B-Pile compliance, measure response mechanisms,
      validate tracking elements, and ensure every element earns its place.

      PRINCIPLE: "If it can't be measured, it's not marketing — it's a hobby."

    agent: kennedy-audit

    tasks:
      - task_id: T4.1
        name: "10 No B.S. Rules Audit"
        required: true
        description: |
          Check compliance with all 10 Rules:
          1. Always an offer 2. Reason to respond NOW
          3. Clear instructions 4. Tracking/measurement
          5. Meaningful follow-up 6. Results rule (no vanity)
          7. Tough love 8. Thick skin
          9. Be in the market 10. Willing to be "bad"
        output: "nobs_rules_audit.md"
        checklist: "checklists/direct-response-checklist.md"

      - task_id: T4.2
        name: "A-Pile/B-Pile Analysis"
        required: true
        description: |
          Evaluate the letter format for A-Pile mail sorting:
          - Does the envelope/subject look personal?
          - Would a human assistant throw this in the B-Pile?
          - Are there grabber/lumpy mail elements if physical?
          - Does the opening reward the reader for opening?
        output: "apile_analysis.md"

      - task_id: T4.3
        name: "Response Mechanism Verification"
        required: true
        description: |
          Verify all response mechanisms are in place:
          - Phone number (with tracking)
          - URL (with tracking)
          - Reply mail (if applicable)
          - QR code (if applicable)
          - Deadline is real and enforced
          - Multiple response channels available
        output: "response_mechanism_check.md"

      - task_id: T4.4
        name: "Final Letter Approval"
        required: true
        description: |
          Final human review with kennedy-audit sign-off.
          Check for: typos, broken links, consistent pricing,
          complete contact info, legal compliance.
          Kennedy: "Read it aloud. If it doesn't sound like one
          person talking to another, rewrite it."
        output: "final_approval.md"

    checkpoint:
      id: CP_PHASE_4
      name: "Sales Letter Approved"
      criteria:
        - "Passes all 10 No B.S. Rules"
        - "A-Pile/B-Pile analysis passed"
        - "All response mechanisms verified"
        - "Final human review complete"
      human_review: true
      message: "Sales letter is ready for deployment."
      veto_conditions:
        - condition: "Fails 3+ of the 10 No B.S. Rules"
          action: "HALT - Return to Phase 2 for rewrite"
        - condition: "No tracking/measurement mechanism"
          action: "BLOCK - Kennedy Rule #4: No tracking = no marketing"

# ===============================================================================
# FINAL OUTPUT
# ===============================================================================

final_output:
  deliverables:
    - name: "Complete Sales Letter"
      file: "final_sales_letter.md"
      description: "Production-ready sales letter with all 28 steps"

    - name: "Headline Bank"
      file: "headline_candidates.md"
      description: "20+ tested headline variations for split testing"

    - name: "Fascination Bullet Library"
      file: "fascination_bullets.md"
      description: "30+ fascination bullets for use across materials"

    - name: "Offer Stack Document"
      file: "offer_stack.yaml"
      description: "Complete offer with value anchoring and bonuses"

    - name: "Audit Report"
      file: "nobs_rules_audit.md"
      description: "10 No B.S. Rules compliance report"

  output_directory: "outputs/kennedy-sales-letter-{timestamp}/"

# ===============================================================================
# VETO CONDITIONS REFERENCE
# ===============================================================================

veto_conditions_ref:
  universal:
    - "VT0-001: No Results Triangle = No Campaign"
    - "VT0-002: No USP = No Differentiation"
    - "VT0-003: No Offer = No Response"
  workflow_specific:
    - "VT1-SL-001: No headline test batch = no letter"
    - "VT1-SL-002: No A-Pile compliance = reformat"
    - "VT1-SL-003: No guarantee = no offer"
  config_file: "config/veto-conditions.yaml"

