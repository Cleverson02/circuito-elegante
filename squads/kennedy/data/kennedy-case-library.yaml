# Kennedy Squad — Case Study Library
# Real Dan Kennedy case studies with documented results
# Version: 1.0.0
# Created: 2026-02-11

# ============================================================================
# PURPOSE: Reference library of Kennedy case studies for agents to cite
# when building campaigns, justifying strategies, or providing proof.
# ============================================================================

case_library:

  - id: CASE-001
    title: "The Dental Practice That 10x'd With Direct Mail"
    industry: dental
    context: |
      A general dentist in a competitive suburban market was spending
      $3,000/month on Yellow Pages and getting mediocre results.
      Kennedy helped redesign the entire marketing system.
    kennedy_frameworks_applied:
      - "Results Triangle (Message-Market-Media)"
      - "A-Pile Mail Strategy"
      - "Shock-and-Awe Package"
    strategy: |
      Replaced Yellow Pages with targeted direct mail to households
      within 5-mile radius. Created a "free dental emergency kit"
      lead magnet. Built shock-and-awe package for new patient inquiry.
      Implemented multi-step follow-up sequence.
    results:
      before: "$250,000/year revenue"
      after: "$2.5M/year revenue within 3 years"
      roi: "New patient acquisition cost dropped from $400 to $125"
      key_metric: "Practice went from 800 to 3,200 active patients"
    kennedy_lesson: |
      "Most professionals compete on credentials. The winning move is
      to compete on MARKETING. Be the best marketer who happens to be
      a dentist, not the best dentist who happens to market."
    source: "No B.S. Direct Marketing, Chapter examples"

  - id: CASE-002
    title: "Gold/Silver Coin Dealer — The Shock-and-Awe Master"
    industry: precious_metals
    context: |
      A precious metals dealer needed to differentiate in a commodity
      market where everyone sold the same gold and silver coins.
    kennedy_frameworks_applied:
      - "Shock-and-Awe Package"
      - "USP Construction"
      - "Multi-Step Mail Campaign"
    strategy: |
      Created an elaborate shock-and-awe package that arrived in a
      padded FedEx envelope with: personalized letter, 48-page report,
      DVD, testimonial booklet, and a real silver coin sample. Follow-up
      sequence of 7 pieces over 21 days.
    results:
      before: "$2M/year in sales"
      after: "$15M/year within 2 years"
      roi: "Shock-and-awe package cost $47/piece, generated average $3,200 first sale"
      key_metric: "Conversion from package recipients: 23%"
    kennedy_lesson: |
      "In a commodity market, the marketer who overwhelms with proof
      and value BEFORE the sale wins. The shock-and-awe package is
      your silent salesperson."
    source: "Magnetic Marketing Course, Session 4"

  - id: CASE-003
    title: "The Chiropractor Who Built a Referral Machine"
    industry: chiropractic
    context: |
      Chiropractor relied 100% on insurance patients and word-of-mouth.
      Income was unpredictable and declining due to insurance cuts.
    kennedy_frameworks_applied:
      - "11-Point Referral System"
      - "Champion Circle of Influence"
      - "Endorsed Mailing System"
    strategy: |
      Built systematic referral program: set expectations at first visit,
      created "refer a friend" card with both-sides incentive, established
      Champion Circle of 15 top patients, launched monthly endorsed
      mailings to local businesses.
    results:
      before: "4 new patients/month from referrals (random)"
      after: "22 new patients/month from referrals (systematic)"
      roi: "Referral cost: $12/patient vs. $175 for advertising"
      key_metric: "450% increase in referral-generated patients"
    kennedy_lesson: |
      "A referral is not a happy accident. It is an engineered outcome.
      The business with a referral SYSTEM will always outgrow the one
      hoping for word-of-mouth."
    source: "Ultimate No BS Referral Machine, Session 8"

  - id: CASE-004
    title: "Information Marketer — From $0 to $1M With Direct Mail"
    industry: information_marketing
    context: |
      A business consultant wanted to launch a high-ticket coaching
      program but had no list and limited budget.
    kennedy_frameworks_applied:
      - "Results Triangle"
      - "28-Step Sales Letter"
      - "USP as Wedge"
    strategy: |
      Created a 12-page sales letter targeting business owners making
      $250K-$1M. Used Kennedy's 28-Step system. Mailed to rented lists
      of business magazine subscribers. Offered free "business audit"
      as lead magnet, followed by shock-and-awe and phone close.
    results:
      before: "$0 in info product revenue"
      after: "$1.2M first year, $3.4M by year three"
      roi: "12-page letter pulled 2.3% response rate"
      key_metric: "Average client worth $8,400/year in coaching fees"
    kennedy_lesson: |
      "A great sales letter to the right list is the most powerful
      money-making machine ever invented. You don't need a website,
      a funnel, or a social media following. You need a letter and a list."
    source: "Copywriting Academy, Session 12"

  - id: CASE-005
    title: "Restaurant Chain — Grabber Mail That Broke Records"
    industry: restaurant
    context: |
      A family restaurant chain with 6 locations wanted to fill
      slow Tuesday and Wednesday nights.
    kennedy_frameworks_applied:
      - "Grabber/Lumpy Mail"
      - "A-Pile Strategy"
      - "Results Triangle"
    strategy: |
      Sent dimensional mail with a chopstick attached and headline:
      "We'll give you something to chew on." Inside: free appetizer
      certificate valid Tue/Wed only, with expiration date. Mailed
      to house list + targeted neighborhood list.
    results:
      before: "35% capacity on Tue/Wed"
      after: "85% capacity on Tue/Wed for 8 weeks straight"
      roi: "Campaign cost $4,200, generated $41,000 in incremental revenue"
      key_metric: "22% redemption rate on free appetizer certificate"
    kennedy_lesson: |
      "Lumpy mail gets opened 99% of the time. Flat mail competes
      with everything else in the mailbox. When you attach something
      physical, you win the A-Pile battle before they read a word."
    source: "Ultimate Marketing Plan, Chapter 7"

  - id: CASE-006
    title: "Financial Advisor — Affluent Client Magnet"
    industry: financial_services
    context: |
      Financial advisor was competing against thousands of others
      offering identical services. Wanted to attract affluent clients.
    kennedy_frameworks_applied:
      - "Affluent Client Attraction"
      - "Money Pyramid"
      - "Premium Positioning"
      - "Book-as-Authority"
    strategy: |
      Published a book ("The Wealth Protection Guide for Executives").
      Used the book as lead magnet via targeted direct mail to executives
      earning $500K+. Follow-up was an invitation-only dinner seminar
      (not a free workshop — an exclusive event). Application required
      to work with the firm.
    results:
      before: "Average client portfolio: $150,000"
      after: "Average client portfolio: $1.2M"
      roi: "Book cost $8/copy, generated $47,000 average LTV per client"
      key_metric: "Went from 400 clients at $150K to 85 clients at $1.2M"
    kennedy_lesson: |
      "You can have 400 needy clients who drain your energy, or 85
      affluent clients who respect your time and pay premium fees.
      The key is positioning and the courage to turn people away."
    source: "Affluent Client Attraction Playbook, Session 6"

  - id: CASE-007
    title: "Auto Repair Shop — The Reactivation Goldmine"
    industry: automotive
    context: |
      Auto repair shop with 3,200 past customers, but only 800 active
      in the last 12 months. 2,400 dormant customers = lost revenue.
    kennedy_frameworks_applied:
      - "Lost Customer Reactivation"
      - "5 Holes in the Bucket"
      - "Multi-Step Campaign"
    strategy: |
      3-step reactivation campaign over 21 days:
      Letter 1: "We miss you" + free oil change
      Letter 2: "Did you get our letter?" + added urgency
      Letter 3: "Last chance" + premium offer (free inspection)
      Included personalized reference to last service date.
    results:
      before: "0 reactivation campaigns (ever)"
      after: "387 of 2,400 dormant customers reactivated (16%)"
      roi: "Campaign cost $3,800, generated $67,000 in first 90 days"
      key_metric: "16% reactivation rate, 68% became repeat customers again"
    kennedy_lesson: |
      "Your dormant customer list is the most overlooked goldmine in
      your business. These people ALREADY bought from you. Getting them
      back costs 1/6th of acquiring a new customer."
    source: "Midas Touch Course, Session 9"

  - id: CASE-008
    title: "Pest Control — From Commodity to Premium Brand"
    industry: pest_control
    context: |
      Pest control company competing on price in a commodity market.
      Kennedy helped reposition as a premium, DR-branded service.
    kennedy_frameworks_applied:
      - "Brand-Building by Direct Response"
      - "StorySelling"
      - "USP as Wedge"
    strategy: |
      Created USP: "The Only Pest Control Company That Guarantees
      No Bugs For 12 Months Or Your Year Is Free." Built personal
      brand around the owner with monthly newsletter and quarterly
      "state of the bugs" report. Used DR-funded brand building.
    results:
      before: "Average customer value: $240/year"
      after: "Average customer value: $1,100/year"
      roi: "Brand + newsletter cost $2,200/month, retention jumped from 40% to 78%"
      key_metric: "4.6x increase in customer lifetime value"
    kennedy_lesson: |
      "Every commodity business can be de-commoditized with a strong
      USP and a brand built on direct response. You don't need a
      bigger ad budget — you need a better story."
    source: "No B.S. Brand-Building by Direct Response, Chapter 11"

  - id: CASE-009
    title: "Business Coach — The Mind Hijacking Launch"
    industry: coaching
    context: |
      Business coach launching a $5,000 mastermind program to an
      audience that had never bought high-ticket before.
    kennedy_frameworks_applied:
      - "Mind Hijacking System"
      - "Fascination Marketing"
      - "Belief Shifting"
    strategy: |
      Pre-launch sequence using fascination-driven emails and direct mail.
      Each piece challenged a false belief: "You don't need a big team,"
      "Revenue doesn't equal profit," "Working harder isn't the answer."
      Built to a live event with mind hijacking presentation structure.
    results:
      before: "Highest-priced offer was $500 (online course)"
      after: "32 enrollments at $5,000 = $160,000 launch"
      roi: "Campaign spend: $8,400. Revenue: $160,000. ROI: 19:1"
      key_metric: "28% of attendees enrolled at $5,000"
    kennedy_lesson: |
      "People don't buy high-ticket because of logic. They buy because
      you shifted their beliefs. The mind hijacking sequence is designed
      to make the old way of thinking untenable."
    source: "Mind Hijacking Course, Session 18"

  - id: CASE-010
    title: "HVAC Company — Multi-Step Mail Domination"
    industry: hvac
    context: |
      HVAC company in a crowded market, spending $12,000/month on
      Google Ads with declining returns.
    kennedy_frameworks_applied:
      - "Multi-Step Mail Campaign"
      - "9 Fatal Marketing Mistakes"
      - "Follow-Up System"
    strategy: |
      Reduced Google Ads to $4,000/month. Redirected $8,000 to a
      5-step direct mail campaign targeting homeowners in specific
      neighborhoods. Created a "Home Comfort Assessment" lead magnet.
      Built automated follow-up sequence triggered by response.
    results:
      before: "$92 cost per lead via Google"
      after: "$34 cost per lead via direct mail campaign"
      roi: "Monthly leads increased from 130 to 340"
      key_metric: "62% reduction in cost per lead"
    kennedy_lesson: |
      "When everyone zigs to digital, zag to direct mail. Your
      mailbox is less crowded than your inbox. That's math, not
      nostalgia."
    source: "No B.S. Direct Marketing, Chapter examples"

  - id: CASE-011
    title: "Plastic Surgeon — From Volume to Premium"
    industry: cosmetic_surgery
    context: |
      Plastic surgeon doing Groupon deals and competing on price.
      Wanted to attract affluent patients willing to pay full price.
    kennedy_frameworks_applied:
      - "Affluent Client Attraction"
      - "Shock-and-Awe Package"
      - "Premium Positioning"
    strategy: |
      Stopped all discounting. Created an "exclusive consultation"
      process (application required). Built premium shock-and-awe with
      before/after portfolio, patient testimonial videos on USB drive,
      and a hardcover "Guide to Aesthetic Excellence." Launched to
      targeted affluent neighborhood mailing list.
    results:
      before: "Average procedure: $3,200 (discounted)"
      after: "Average procedure: $12,800 (full price)"
      roi: "Fewer patients, 3.5x higher revenue, 6x higher profit margin"
      key_metric: "Patient volume dropped 60%, revenue increased 40%"
    kennedy_lesson: |
      "Fewer better clients at higher prices is ALWAYS more profitable
      than more cheap clients at discount prices. The math never lies."
    source: "Affluent Client Attraction Playbook, Session 3"

  - id: CASE-012
    title: "Retail Store — The Birthday Campaign That Paid for Itself"
    industry: retail
    context: |
      A specialty retail store wanted to increase repeat visits and
      customer lifetime value.
    kennedy_frameworks_applied:
      - "Retention System"
      - "Multi-Step Campaign"
      - "Personal Touch Marketing"
    strategy: |
      Implemented a birthday campaign: personalized card with $25 gift
      certificate valid for 2 weeks. Sent via A-Pile mail (hand-addressed,
      real stamp). Followed up with "don't forget your birthday gift"
      email 7 days later.
    results:
      before: "Average 1.8 visits/year per customer"
      after: "Average 3.4 visits/year per customer"
      roi: "Birthday program cost $4.50/customer, generated $67 average spend per visit"
      key_metric: "72% redemption rate on birthday certificates"
    kennedy_lesson: |
      "The cheapest customer to acquire is the one you already have.
      A simple birthday campaign can double your visit frequency
      because it makes the customer feel VALUED, not marketed to."
    source: "Ultimate Marketing Plan, Chapter 12"

