top_issues:
  - severity: medium
    category: testing
    description: |
      Payload customer minimalista nao testado contra API real da Elevare.
      Se API rejeitar por falta de `address`, abrir Story 3.12 para expandir payload.
    recommendation: |
      Executar smoke test pos-merge com ElevareClient.search() + registerCustomer()
      contra staging/producao. Documentar resultado em 3.11-followup-ambiguities.md.

  - severity: medium
    category: requirements
    description: |
      Webhook inbound (Elevare → Stella) ainda usa schema nao documentado na Postman.
      Event types `quote_expiring`, `reservation_confirmed`, `payment_failed`,
      `quote_created` foram inferidos, nao confirmados pela Elevare.
    recommendation: |
      Abrir ticket com Elevare solicitando schema oficial do webhook.
      Story 3.12 realinha handler, processor, repository e tests.

  - severity: low
    category: code
    description: |
      `offerId` declarado como string em types.ts:39 (ElevareOffer), mas quotation
      body usa number (conforme Postman `"offerId": 0`). Inconsistencia de tipo.
    recommendation: |
      Unificar como number em types.ts quando Elevare confirmar o tipo no response.
      Possivel coercao intermediaria se necessario.

  - severity: low
    category: tests
    description: |
      Zero integration/E2E tests — toda validacao e unitaria com mocks.
    recommendation: |
      Adicionar em Story 3.12 apos ambiguidades resolvidas (evita retrabalho).

