expires: '2026-04-19T21:00:00Z'

top_issues:
  - id: 'I18N-001'
    severity: medium
    finding: 'guestContext.language hardcoded to "pt" in both Redis fast path (elevare-processor.ts:98) and DB fallback (elevare-processor.ts:109). Contradicts AC16 which promises PT/EN/ES prose via Persona Agent — all webhook follow-ups will be in Portuguese regardless of guest language.'
    suggested_action: 'Add `language` field to QuotationState (Story 3.3) or look up session.language via cacheGet before building GuestContext. Short-term: document as known limitation.'
    suggested_owner: dev
    refs: ['backend/src/webhooks/elevare-processor.ts:85-115']
  - id: 'CONFIG-001'
    severity: low
    finding: 'ELEVARE_WEBHOOK_SECRET read via process.env directly in routes.ts:14, bypassing the Zod env schema in config/env.ts. Other Elevare vars (API_URL, API_KEY, CLIENT_ID) are validated — inconsistent pattern.'
    suggested_action: 'Add ELEVARE_WEBHOOK_SECRET to config/env.ts schema with .optional() and reference via env.ELEVARE_WEBHOOK_SECRET. Aligns with existing validation flow.'
    suggested_owner: dev
    refs: ['backend/src/api/routes.ts:14', 'config/env.ts']
  - id: 'INFRA-001'
    severity: low
    finding: 'Conditional JSON content-type parser override (elevare-handler.ts:204-220): if app already has a parser, rawBody may not be set. Works in current codebase, but brittle if another route registers rawBody handling.'
    suggested_action: 'Add explicit check that rawBody is available after parse; document requirement in registerElevareWebhookRoute JSDoc.'
    suggested_owner: dev
    refs: ['backend/src/webhooks/elevare-handler.ts:204-220']
  - id: 'TEST-001'
    severity: low
    finding: 'Integration test missing for full webhook → Persona → delivery flow. Unit tests mock Persona Agent response.'
    suggested_action: 'Add integration test in tests/integration/ when Story 3.10 (Postman fixture) is implemented.'
    suggested_owner: qa

