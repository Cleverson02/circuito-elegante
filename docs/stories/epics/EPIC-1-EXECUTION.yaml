# Epic 1: Foundation & Data Layer — Execution Plan
# Status: READY FOR DEVELOPMENT
# Owner: @pm (Morgan)
# Created: 2026-04-02

epic:
  id: EPIC-1
  title: "Foundation & Data Layer"
  description: "Repo, DB, data ingestao, health check — fundacao para todos os epics subsequentes"
  status: ready
  priority: P0-critical
  prd_reference: "docs/prd/PRD-Concierge-Digital-Stella.md#epic-1"
  architecture_reference: "docs/architecture/architecture.md"
  schema_reference: "docs/architecture/SCHEMA.md"

  dependencies:
    external:
      - Supabase project criado (DATABASE_URL disponivel)
      - OpenAI API key (para embeddings no Story 1.4)
      - Google Drive folder ID (para FAQs no Story 1.4)
      - Planilha 92 hoteis (CSV) disponivel em data/
    internal: []

  success_criteria:
    - GET /health retorna status consolidado de todas as dependencias
    - 92 hoteis inseridos no PostgreSQL (32 has_api + 60 manuais)
    - ~430 FAQ embeddings no pgvector com HNSW index
    - Redis sessions funcionando com TTL
    - CI pipeline verde (lint + test + smoke)

  estimated_effort: "3-5 dias de desenvolvimento"

# ============================================================
# WAVE PLAN — Desenvolvimento Paralelo
# ============================================================

waves:
  - wave: 1
    name: "Scaffold + Infraestrutura"
    stories: ["1.1"]
    parallel: false
    rationale: "Story 1.1 e prerequisito para tudo — scaffold, Docker, CI"

  - wave: 2
    name: "Data Layer (Sequencial)"
    stories: ["1.2", "1.5"]
    parallel: false
    rationale: "Schema PG (1.2) deve executar ANTES de Redis (1.5) para evitar merge conflict em health.ts. Identificado na validacao Pre-Flight R1 da Story 1.5"

  - wave: 3
    name: "Data Ingestion (Paralelo)"
    stories: ["1.3", "1.4"]
    parallel: true
    rationale: "Ingestao de hoteis (1.3) e FAQs (1.4) sao independentes. Ambas dependem de 1.2"

  - wave: 4
    name: "Validation"
    stories: ["1.6"]
    parallel: false
    rationale: "Smoke test valida tudo — depende de todas as stories anteriores"

